<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

/* LIGHT THEME */
:root {
    --bg-color: #ffffff;
    --text-color: #1a202c;
    --muted-text: #4a5568;
    --card-bg: #f7fafc;
    --card-hover-bg: #edf2f7;
    --border-color: #e2e8f0;
    --header-color: #2b6cb0;
    --link-color: #3182ce;
}

/* DARK THEME */
body.dark {
    --bg-color: #0d1117;
    --text-color: #c9d1d9;
    --muted-text: #8b949e;
    --card-bg: #161b22;
    --card-hover-bg: #21262d;
    --border-color: #30363d;
    --header-color: #58a6ff;
    --link-color: #58a6ff;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
}

/* GRID */
.project-wrapper {
    max-width: 1100px;
    margin: 0 auto;
}

.project-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.5rem;
}

/* Tablet */
@media (max-width: 900px) {
    .project-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobile */
@media (max-width: 500px) {
    .project-grid {
        grid-template-columns: 1fr;
    }
}

/* CARD */
.project-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 1rem;
    transition: 0.25s;
    /* max-width: 350px; */
    margin: 0 auto;
    height: 100%;
}

.project-card:hover {
    transform: translateY(-6px);
    background: var(--card-hover-bg);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.project-title {
    color: var(--header-color);
    font-size: 1.2rem;
    font-weight: 600;
}

.project-summary {
    color: var(--muted-text);
    margin: 0.5rem 0;
}

/* BUTTON */
.btn {
    color: var(--link-color);
    cursor: pointer;
}
.btn:hover {
    text-decoration: underline;
}

/* DETAIL */
.project-detail {
    display: none;
}

.project-detail.active {
    display: block;
}

/* IMAGE */
.project-image {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* CONTENT */
.markdown-content h3 {
    border-bottom: 1px solid var(--border-color);
    margin-top: 1rem;
}

.markdown-content ul {
    margin-left: 1.5rem;
}

/* TOGGLE */
.toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 5px 10px;
    cursor: pointer;
}
</style>

<button class="toggle-btn" onclick="toggleTheme()">Toggle Theme</button>

<div id="project-list">
    <h1 style="text-align:center;">Projects</h1>
    <div class="project-grid" id="project-grid"></div>
</div>

<div id="project-detail" class="project-detail">
    <button class="btn" onclick="goBack()">← Back</button>
    <h1 id="project-title"></h1>
    <div id="project-content" class="markdown-content"></div>
</div>

<div class="project-wrapper">

const title = document.getElementById("project-title");
const content = document.getElementById("project-content");

projects.forEach(p => {
    const card = document.createElement("div");
    card.className = "project-card";

    card.innerHTML = `
        <img src="${p.cardImage}" class="project-image">
        <div class="project-title">${p.title}</div>
        <div class="project-summary">${p.summary}</div>
        <div class="btn">View Details →</div>
    `;

        title.textContent = p.title;
        content.innerHTML = p.content;

        list.style.display = "none";
        detail.classList.add("active");
        window.scrollTo(0,0);
    };

    grid.appendChild(card);
});

function goBack() {
    detail.classList.remove("active");
    list.style.display = "block";
}

function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

const saved = localStorage.getItem("theme");
if (saved === "dark") document.body.classList.add("dark");
