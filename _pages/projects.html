{% include base_path %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

:root {
    --bg-color: #ffffff;
    --text-color: #1a202c;
    --muted-text: #4a5568;
    --card-bg: #f7fafc;
    --card-hover-bg: #edf2f7;
    --border-color: #e2e8f0;
    --header-color: #2b6cb0;
    --link-color: #3182ce;
}

body.dark {
    --bg-color: #0d1117;
    --text-color: #c9d1d9;
    --muted-text: #8b949e;
    --card-bg: #161b22;
    --card-hover-bg: #21262d;
    --border-color: #30363d;
    --header-color: #58a6ff;
    --link-color: #58a6ff;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
}

/* GRID */
.project-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.5rem;
}

@media (max-width: 900px) {
    .project-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 500px) {
    .project-grid {
        grid-template-columns: 1fr;
    }
}

/* CARD */
.project-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 1rem;
    transition: 0.25s;
    height: 100%;
}

.project-card:hover {
    transform: translateY(-6px);
    background: var(--card-hover-bg);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.project-title {
    color: var(--header-color);
    font-size: 1.2rem;
    font-weight: 600;
}

.project-summary {
    color: var(--muted-text);
    margin: 0.5rem 0;
}

.btn {
    display: inline-block;
    margin-right: 10px;
    font-size: 0.9rem;
    cursor: pointer;
}
.btn:hover {
    text-decoration: underline;
}

.project-detail {
    display: none;
}
.project-detail.active {
    display: block;
}

.project-image {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
}

.markdown-content h3 {
    border-bottom: 1px solid var(--border-color);
    margin-top: 1rem;
}

.markdown-content ul {
    margin-left: 1.5rem;
}

.toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 5px 10px;
    cursor: pointer;
}
</style>

<button class="toggle-btn" onclick="toggleTheme()">Toggle Theme</button>

<div id="project-list">
    <h1 style="text-align:center;">Projects</h1>
    <div class="project-grid" id="project-grid"></div>
</div>

<div id="project-detail" class="project-detail">
    <button class="btn" onclick="goBack()">← Back</button>
    <h1 id="project-title"></h1>
    <div id="project-content" class="markdown-content"></div>
</div>

<script>
const projects = [
    {
        id: 'project-1',
        title: '5-stage Pipelined RISC-V Processor Design',
        summary: 'A 32-bit, 5-stage pipelined RISC-V Processor deployed on Basys3 FPGA Board.',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1bW-GHcoLQFmdqhAaoFF5XAE_aAVngoso/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-2',
        title: '16-bit Multi-Cycle CISC Processor Design',
        summary: 'A 16-bit multi-cycle CISC processor implemented in Verilog and deployed on Basys3 FPGA Board.',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1oBWfhdKV-ZTHbacefnArxMnNZ6lxaMfm/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-3',
        title: 'Hopfield Neural Network with AER for solving Max-cut Problems',
        summary: 'A HNN implementation using Address Event Representation (AER).',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1gPgPMzPiseQPVSkwUiXxilkvjWukkrGB/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-4',
        title: 'RGB Image Filtering Implementation with HDMI Display',
        summary: 'RGB image filtering with HDMI output on Pynq Z1.',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1fNbAf4MgRxfRLfBULAC_FZTKvdhO-Voc/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-5',
        title: 'SPI Controller',
        summary: 'SPI protocol implementation for communication.',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1i1vMGepqPrHz_vlKXoBDGtbDw1Ulqn4L/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-6',
        title: 'Radix-4 Booth Multiplier',
        summary: '16-bit pipelined multiplier in Cadence.',
        cardImage: 'https://placehold.co/400x200',
        reportLink: `https://drive.google.com/file/d/1Pta7Nhsla7cjnECiPq5cuObFAh3U5DZC/view?usp=sharing`,
        content: `...`
    },
    {
        id: 'project-7',
        title: 'IMU Sensor Controlled Car',
        summary: 'Car controlled using IMU and ESP32.',
        cardImage: 'https://placehold.co/400x200',
        content: `...`
    }
];

const grid = document.getElementById("project-grid");
const detail = document.getElementById("project-detail");
const list = document.getElementById("project-list");

const title = document.getElementById("project-title");
const content = document.getElementById("project-content");

projects.forEach(p => {
    const card = document.createElement("div");
    card.className = "project-card";

    card.innerHTML = `
        <img src="${p.cardImage}" class="project-image">
        <div class="project-title">${p.title}</div>
        <div class="project-summary">${p.summary}</div>

        <div class="btn view-btn">View Details →</div>

        ${p.reportLink ? 
        `<a href="${p.reportLink}" target="_blank" class="btn report-btn">View Report 📄</a>` 
        : ''
        }
    `;

    card.querySelector(".view-btn").onclick = () => {
        title.textContent = p.title;
        content.innerHTML = p.content;

        list.style.display = "none";
        detail.classList.add("active");
        window.scrollTo(0,0);
    };

    grid.appendChild(card);
});

function goBack() {
    detail.classList.remove("active");
    list.style.display = "block";
}

function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

const saved = localStorage.getItem("theme");
if (saved === "dark") document.body.classList.add("dark");
</script>
